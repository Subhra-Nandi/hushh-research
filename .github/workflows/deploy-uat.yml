name: Deploy to UAT

on:
  push:
    branches:
      - deploy_uat
  workflow_dispatch:
    inputs:
      scope:
        description: "Deploy backend only, frontend only, or both"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  GCP_PROJECT_ID: hushh-pda-uat
  GCP_REGION: us-central1
  BACKEND_SERVICE: consent-protocol
  FRONTEND_SERVICE: hushh-webapp
  UAT_CLOUDSQL_INSTANCE: hushh-pda-uat:us-central1:hushh-uat-pg
  UAT_DB_UNIX_SOCKET: /cloudsql/hushh-pda-uat:us-central1:hushh-uat-pg
  CLOUD_RUN_REVISION_RETENTION: "10"

jobs:
  deploy:
    name: Deploy UAT Scope
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert UAT branch contains latest main
        run: bash scripts/ci/require-branch-contains-main.sh deploy_uat

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_UAT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project context
        run: gcloud config set project "${{ env.GCP_PROJECT_ID }}"

      - name: Assert GCP project scope
        shell: bash
        run: |
          set -euo pipefail
          ACTIVE_PROJECT="$(gcloud config get-value project 2>/dev/null)"
          if [ "$ACTIVE_PROJECT" != "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "Refusing deploy: expected project '${{ env.GCP_PROJECT_ID }}' but got '$ACTIVE_PROJECT'."
            exit 1
          fi

      - name: Resolve deployment scope
        id: scope
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SCOPE="${{ github.event.inputs.scope }}"
          else
            SCOPE="all"
          fi

          case "$SCOPE" in
            backend)
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=false
              ;;
            frontend)
              DEPLOY_BACKEND=false
              DEPLOY_FRONTEND=true
              ;;
            *)
              SCOPE="all"
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=true
              ;;
          esac

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$DEPLOY_BACKEND" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$DEPLOY_FRONTEND" >> "$GITHUB_OUTPUT"

      - name: Deploy backend using Cloud Build
        if: steps.scope.outputs.deploy_backend == 'true'
        run: |
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/backend.cloudbuild.yaml \
            --substitutions=_BACKEND_SERVICE=${{ env.BACKEND_SERVICE }},_REGION=${{ env.GCP_REGION }},_ENVIRONMENT=uat,_DB_HOST=cloudsql-socket,_DB_PORT=5432,_DB_NAME=postgres,_DB_UNIX_SOCKET=${{ env.UAT_DB_UNIX_SOCKET }},_CLOUDSQL_INSTANCES=${{ env.UAT_CLOUDSQL_INSTANCE }},_CORS_ALLOWED_ORIGINS=https://placeholder.invalid,_OBS_DATA_STALE_RATIO_THRESHOLD=0.25,_PLAID_ENV=sandbox,_PLAID_CLIENT_NAME=Hushh Kai,_PLAID_COUNTRY_CODES=US,_PLAID_WEBHOOK_URL=https://uat.kai.hushh.ai/api/kai/plaid/webhook,_PLAID_REDIRECT_PATH=/kai/plaid/oauth/return,_PLAID_TX_HISTORY_DAYS=730,_PLAID_CLIENT_ID_SECRET=PLAID_CLIENT_ID,_PLAID_SECRET_SECRET=PLAID_SECRET,_PLAID_TOKEN_ENCRYPTION_KEY_SECRET=PLAID_TOKEN_ENCRYPTION_KEY

      - name: Get backend URL
        if: steps.scope.outputs.deploy_backend == 'true'
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $BACKEND_URL"

      - name: Retain latest backend revisions
        if: steps.scope.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.BACKEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Deploy frontend using Cloud Build
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/frontend.cloudbuild.yaml \
            --substitutions=_FRONTEND_SERVICE=${{ env.FRONTEND_SERVICE }},_REGION=${{ env.GCP_REGION }},_APP_ENV=uat

      - name: Get frontend URL
        if: steps.scope.outputs.deploy_frontend == 'true'
        id: frontend-url
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Update backend CORS allowlist to UAT frontend
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          RUN_APP_FRONTEND_URL="${{ steps.frontend-url.outputs.url }}"
          CUSTOM_FRONTEND_URL="$(gcloud secrets versions access latest \
            --secret=FRONTEND_URL \
            --project="${{ env.GCP_PROJECT_ID }}")"
          BACKEND_SERVICE_JSON="$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --format=json)"
          EXISTING_CORS="$(printf '%s' "${BACKEND_SERVICE_JSON}" | jq -r \
            '.spec.template.spec.containers[0].env[]? | select(.name=="CORS_ALLOWED_ORIGINS") | .value' | head -n1)"

          MERGED_CORS="$(python3 - <<'PY' "${EXISTING_CORS}" "${CUSTOM_FRONTEND_URL}" "${RUN_APP_FRONTEND_URL}"
          import sys
          from urllib.parse import urlparse

          def normalize(origin: str) -> str:
              raw = (origin or "").strip()
              if not raw:
                  return ""
              parsed = urlparse(raw)
              if parsed.scheme and parsed.netloc:
                  return f"{parsed.scheme}://{parsed.netloc}"
              return ""

          seen = set()
          ordered = []
          for arg in sys.argv[1:]:
              for item in (arg or "").split(","):
                  origin = normalize(item)
                  if origin and origin not in seen:
                      seen.add(origin)
                      ordered.append(origin)

          print(",".join(ordered))
          PY
          )"

          # Use a custom delimiter so comma-separated origins are treated as one env var value.
          gcloud run services update "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --update-env-vars "^##^CORS_ALLOWED_ORIGINS=${MERGED_CORS}"

      - name: Retain latest frontend revisions
        if: steps.scope.outputs.deploy_frontend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.FRONTEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Deployment Summary
        if: always()
        shell: bash
        run: |
          echo "UAT Deployment Complete"
          echo "Scope: ${{ steps.scope.outputs.scope }}"
          if [ "${{ steps.scope.outputs.deploy_backend }}" = "true" ]; then
            echo "Backend: ${{ steps.backend-url.outputs.url }}"
          else
            echo "Backend: skipped"
          fi
          if [ "${{ steps.scope.outputs.deploy_frontend }}" = "true" ]; then
            echo "Frontend: ${{ steps.frontend-url.outputs.url }}"
          else
            echo "Frontend: skipped"
          fi
